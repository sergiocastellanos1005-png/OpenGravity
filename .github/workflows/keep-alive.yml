name: Keep Render Alive

on:
  schedule:
    # Se ejecuta cada 10 minutos
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          curl -s https://opengravity-hsjt.onrender.com/ > /dev/null
          echo "Ping enviado a Render exitosamente."
